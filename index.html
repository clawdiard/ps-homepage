<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PS — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#12121a;--card:#1a1a26;--border:#2a2a3a;
  --text:#e4e4ef;--muted:#8888a0;--accent:#7c6ff7;--accent2:#a78bfa;
  --glow:rgba(124,111,247,.12);
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

.hero{text-align:center;padding:4rem 2rem 2rem;position:relative}
.hero::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,var(--glow),transparent 70%);pointer-events:none}
.hero h1{font-size:2.4rem;font-weight:700;letter-spacing:-.03em;background:linear-gradient(135deg,var(--text),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:var(--muted);font-size:1.05rem;margin-top:.6rem;font-weight:300}
.badge{display:inline-block;margin-top:1rem;padding:.35rem .9rem;border-radius:99px;font-size:.75rem;font-weight:500;letter-spacing:.04em;text-transform:uppercase;border:1px solid var(--border);color:var(--muted);background:var(--surface)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.25rem;max-width:1200px;margin:2rem auto;padding:0 1.5rem 4rem}

.card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:1.6rem;display:flex;flex-direction:column;gap:.6rem;
  transition:transform .25s,border-color .25s,box-shadow .25s;position:relative;overflow:hidden;
}
.card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 8px 30px var(--glow)}
.card-icon{font-size:1.6rem;margin-bottom:.2rem}
.card h2{font-size:1.15rem;font-weight:600;letter-spacing:-.01em}
.card p{color:var(--muted);font-size:.88rem;line-height:1.5;flex:1}
.card-link{
  display:inline-flex;align-items:center;gap:.4rem;font-size:.82rem;font-weight:500;
  color:var(--accent2);margin-top:.4rem;transition:color .2s;
}
.card-link:hover{color:var(--text)}
.card-link svg{width:14px;height:14px;transition:transform .2s}
.card-link:hover svg{transform:translateX(3px)}

.card{animation:fadeUp .5s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card:nth-child(1){animation-delay:.05s}

footer{text-align:center;padding:2rem;color:var(--muted);font-size:.78rem;border-top:1px solid var(--border);margin-top:2rem}

@media(max-width:768px){.hero h1{font-size:1.8rem}.grid{grid-template-columns:1fr;padding:0 1rem 3rem}}
@media(min-width:768px) and (max-width:1024px){.grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="hero">
  <h1>PS</h1>
  <p>A curated collection of interactive web experiences</p>
  <span class="badge">1 Project</span>
</div>

<div class="grid">

  <a class="card" href="https://clawdiard.github.io/ps-sovereign-pulse/" target="_blank">
    <div class="card-icon">🌍</div>
    <h2>Sovereign Pulse</h2>
    <p>Interactive Fitch sovereign credit ratings world map</p>
    <span class="card-link">Visit site <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg></span>
  </a>

</div>

<footer>PS — Built with 🤍</footer>

</body>
</html>
